name: Build & Deploy StatusCode.dev (GitHub Pages)

# ============================================================================
# ZERO-COST DEPLOY for the contentsite (programmatic-SEO HTTP status site)
# ----------------------------------------------------------------------------
# GitHub Actions is the "always-on scheduler" (free: 2,000 min/mo private,
# UNLIMITED on public repos). On a daily cron it rebuilds the static site from
# data.json and publishes ./public to GitHub Pages. No server, no bill.
#
#   build.py (reads data.json)  ->  ./public/*.html + sitemap + robots  ->  Pages
#
# This site is data-driven (not scraped), so the daily cron mainly refreshes
# the sitemap <lastmod> / footer year and picks up any data.json edits. Manual
# dispatch covers "I just edited content, publish now".
#
# ONE-TIME HUMAN SETUP (once, in the GitHub web UI):
#   1. Push this project to its own GitHub repo (public = unlimited free CI).
#   2. Repo -> Settings -> Pages -> "Build and deployment"
#        Source = "GitHub Actions"     <-- IMPORTANT, not "Deploy from a branch"
#   3. In data.json set your real base_url, AdSense publisher id, and affiliate
#      ref codes. In build.py the ADSENSE_SLOT / ADSENSE_HEAD blocks stay inert
#      (commented) until you uncomment them after AdSense approval.
#   4. Run once: Actions -> this workflow -> "Run workflow" to confirm green.
# ============================================================================

on:
  schedule:
    - cron: "30 21 * * *"   # 21:30 UTC daily (UTC on GitHub)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "contentsite/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static site
        run: python3 build.py   # stdlib only; writes ./public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ============================================================================
# ALTERNATIVE: Cloudflare Pages (free, easy custom domains). Needs secrets:
#   CLOUDFLARE_API_TOKEN  (Pages:Edit), CLOUDFLARE_ACCOUNT_ID
